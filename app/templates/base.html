<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1b4b">
    <title>Gestão TI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Fundo gradiente escuro */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: white;
            /* Dá espaço para o menu inferior não engolir o texto */
            padding-bottom: 80px; 
        }
        /* Esconde a barra de rolagem (scroll) para estética de app */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <header class="p-4 flex justify-between items-center backdrop-blur-md bg-white/5 border-b border-white/10 sticky top-0 z-50">
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
            Gestão TI
        </h1>
        <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50">
            <span class="text-xs font-bold text-indigo-300">IT</span>
        </div>
    </header>

    <main class="p-4">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-0 w-full backdrop-blur-xl bg-slate-900/80 border-t border-white/10 flex justify-around p-3 z-50">
        <a href="/" class="flex flex-col items-center text-indigo-400">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] mt-1">Início</span>
        </a>
        
        <a href="/nova-conta" class="flex flex-col items-center text-gray-400 hover:text-indigo-400 transition">
            <div class="bg-indigo-600 w-12 h-12 rounded-full flex items-center justify-center -mt-6 shadow-lg shadow-indigo-500/30 text-white border-4 border-slate-900">
                <span class="text-2xl font-bold">+</span>
            </div>
        </a>
        
        <a href="/historico" class="flex flex-col items-center text-gray-400 hover:text-indigo-400 transition">
            <span class="text-xl">📊</span>
            <span class="text-[10px] mt-1">Histórico</span>
        </a>
    </nav>
</body>
</html>
