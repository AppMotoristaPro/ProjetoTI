<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f4f6f9">
    <title>Despesas T&I</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icone.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <script>
        const temaSalvo = localStorage.getItem('app_theme') || 'blue';
        document.documentElement.setAttribute('data-theme', temaSalvo);

        // --- SOLUÇÃO DO BUG DAS NOTIFICAÇÕES: IDENTIDADE FIXA ---
        let usuarioReal = localStorage.getItem('usuario_real');
        if (!usuarioReal) {
            usuarioReal = prompt("Quem é o dono deste celular? (Digite Igor ou Thaynara)", "Igor");
            if (usuarioReal !== 'Igor' && usuarioReal !== 'Thaynara') usuarioReal = 'Igor';
            localStorage.setItem('usuario_real', usuarioReal);
        }

        const originalFetch = window.fetch;
        window.fetch = async function(resource, config) {
            const currentUser = localStorage.getItem('usuario_real') || 'Igor';
            
            config = config || {};
            config.headers = config.headers || {};
            
            if (config.headers instanceof Headers) {
                config.headers.append('X-Usuario-Atual', currentUser);
            } else {
                config.headers['X-Usuario-Atual'] = currentUser;
            }

            if (resource === '/api/despesas/nova' && config.body instanceof FormData) {
                config.body.append('autor_criacao', currentUser);
            }
            
            return originalFetch(resource, config);
        };
        // --------------------------------------------------------
    </script>

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.4);
            --bg-header: rgba(244, 246, 249, 0.85);
            --color-primary: #4f46e5;
            --color-primary-light: #e0e7ff;
            --color-action: #ff8c00;
            --grad-bg: radial-gradient(circle at 15% 20%, rgba(186, 155, 253, 0.4) 0%, transparent 50%), radial-gradient(circle at 85% 80%, rgba(138, 191, 255, 0.4) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(255, 179, 198, 0.3) 0%, transparent 60%);
        }

        [data-theme="pink"] {
            --color-primary: #db2777;
            --color-primary-light: #fce7f3;
            --color-action: #9333ea;
            --grad-bg: radial-gradient(circle at 15% 20%, rgba(244, 114, 182, 0.4) 0%, transparent 50%), radial-gradient(circle at 85% 80%, rgba(192, 132, 252, 0.4) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(251, 113, 133, 0.3) 0%, transparent 60%);
        }

        .show-on-blue { display: none !important; }
        [data-theme="blue"] .show-on-pink { display: none !important; }
        [data-theme="blue"] .show-on-blue { display: block !important; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            background-image: var(--grad-bg);
            background-attachment: fixed;
            min-height: 100vh;
            color: #2d3748;
            padding-bottom: 120px; 
            padding-top: 80px;
        }
        
        .ultra-glass {
            background: var(--bg-glass);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .btn-active { background: var(--color-action); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); }
        .text-theme { color: var(--color-primary); }
        .bg-theme-light { background-color: var(--color-primary-light); color: var(--color-primary); }
        
        ::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .speed-dial-menu { opacity: 0; transform: translateY(20px) scale(0.9); pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .speed-dial-menu.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

        /* Animação para a Caça ao Tesouro */
        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .heart-beat { animation: pulse-heart 1.5s infinite; }
    </style>
</head>
<body>
    <header id="main-header" style="background: var(--bg-header)" class="fixed top-0 left-0 w-full pt-6 pb-4 px-4 text-center z-50 backdrop-blur-md border-b border-white/50">
        <h1 onclick="toggleTheme()" class="text-2xl font-black tracking-tight text-theme cursor-pointer active:scale-95 transition-transform">Despesas T&I 🫶</h1>
    </header>

    <main class="p-4 max-w-lg mx-auto relative z-10">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-6 w-[92%] max-w-sm left-1/2 -translate-x-1/2 ultra-glass flex justify-between items-center px-4 py-3 z-50 rounded-[35px]">
        <a href="/" class="flex flex-col items-center group"><div class="p-2 rounded-xl transition-all group-active:scale-90 text-slate-500 hover:text-theme"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></div></a>

        <div class="relative flex flex-col items-center group">
            <div id="speedDialMenu" class="speed-dial-menu absolute bottom-16 left-1/2 -translate-x-1/2 flex flex-col gap-3 pb-2 w-[200px] z-50">
                <a href="/entradas" class="flex items-center gap-3 p-3 bg-white/90 backdrop-blur-md rounded-2xl shadow-xl border border-white/60 text-slate-700 font-bold active:scale-95 transition"><span class="w-8 h-8 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center">💰</span> Entradas</a>
                <a href="/fixas" class="flex items-center gap-3 p-3 bg-white/90 backdrop-blur-md rounded-2xl shadow-xl border border-white/60 text-slate-700 font-bold active:scale-95 transition"><span class="w-8 h-8 rounded-xl bg-theme-light flex items-center justify-center">🏠</span> Despesas Fixas</a>
                <a href="/variaveis" class="flex items-center gap-3 p-3 bg-white/90 backdrop-blur-md rounded-2xl shadow-xl border border-white/60 text-slate-700 font-bold active:scale-95 transition"><span class="w-8 h-8 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center">💳</span> Despesas Variáveis</a>
            </div>
            <button onclick="toggleSpeedDial()" class="p-2 rounded-xl transition-all active:scale-90 text-slate-500 hover:text-theme focus:outline-none"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></button>
        </div>

        <button id="btnCentralPlus" class="flex flex-col items-center relative z-50 active:scale-95 transition-transform focus:outline-none"><div class="btn-active w-14 h-14 rounded-full flex items-center justify-center shadow-lg text-white -mt-5"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></div></button>

        <a href="/rotas" class="flex flex-col items-center group"><div class="p-2 rounded-xl transition-all group-active:scale-90 text-slate-500 hover:text-theme">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        </div></a>
        <a href="/historico" class="flex flex-col items-center group"><div class="p-2 rounded-xl transition-all group-active:scale-90 text-slate-500 hover:text-theme"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div></a>
    </nav>

    <div id="speedDialOverlay" onclick="toggleSpeedDial()" class="fixed inset-0 bg-slate-900/10 backdrop-blur-[2px] z-40 hidden transition-opacity opacity-0"></div>

    <div id="modalDiaDia" class="hidden fixed inset-0 z-[70] flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 pb-24 transition-opacity">
        <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative animate-slide-up">
            <button onclick="fecharModalDiaDia()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <h3 class="text-lg font-black text-theme mb-1">Gasto do Dia-a-Dia</h3>
            <p class="text-xs font-medium text-slate-500 mb-6">Lançamento rápido na data de hoje.</p>
            
            <form id="formDiaDia" class="space-y-4">
                <input type="hidden" name="tipo_despesa" value="Diária">
                <input type="hidden" name="pago" value="true">
                <input type="hidden" id="diadia_vencimento" name="data_vencimento">
                
                <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1 block mb-1">O que foi?</label><input type="text" name="descricao" placeholder="Ex: Café, Estacionamento..." class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 font-bold outline-none" required></div>
                <div class="flex gap-3">
                    <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1 block mb-1">Valor</label><input type="number" step="0.01" name="valor" placeholder="0.00" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 font-black outline-none" required></div>
                    <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1 block mb-1">Quem Pagou?</label><select name="responsavel_pagamento" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 font-bold outline-none" required><option value="Igor">Igor</option><option value="Thaynara">Thaynara</option></select></div>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1 block mb-1">Categoria</label>
                    <select name="categoria" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 font-bold outline-none" required>
                        <option value="Besteira">Besteira</option>
                        <option value="Carro">Carro</option>
                        <option value="Combustível">Combustível</option>
                        <option value="Farmácia">Farmácia</option>
                        <option value="Mercado">Mercado</option>
                        <option value="Mercado Livre">Mercado Livre</option>
                        <option value="Restaurante">Restaurante</option>
                        <option value="Shopee">Shopee</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <button type="submit" id="btnSalvarDiaDia" class="w-full py-4 mt-2 btn-active text-white rounded-2xl font-black tracking-widest active:scale-95 transition">LANÇAR GASTO</button>
            </form>
        </div>
    </div>

    <div id="cacaTesouroOverlay" class="hidden fixed inset-0 z-[100] bg-gradient-to-br from-pink-300 via-rose-300 to-pink-500 backdrop-blur-md overflow-y-auto flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white/95 backdrop-blur-lg rounded-[40px] p-8 shadow-2xl relative border border-white/50" id="ctContent">
            </div>
    </div>

    <script>
        // --- Ocultar cabeçalho se não for a Home ---
        document.addEventListener("DOMContentLoaded", () => {
            if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
                const header = document.getElementById('main-header');
                if (header) {
                    header.style.display = 'none';
                    document.body.style.paddingTop = '20px';
                }
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js?v=2').then(reg => { reg.update(); }).catch(err => console.error('❌ Erro no SW:', err));
        }

        const publicVapidKey = 'BBN1tLnB8VQRegpxtWOXIcWzCKGDdI2Zvxu93Bdt64Tur25vnp_JnQw3vhN6pmyyxPMS8DBhrMuB4xajBF6b4Ps';
        
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
            return outputArray;
        }

        async function registerPush() {
            if ('serviceWorker' in navigator && 'PushManager' in window) {
                try {
                    const swReg = await navigator.serviceWorker.ready;
                    let subscription = await swReg.pushManager.getSubscription();
                    if (!subscription) {
                        subscription = await swReg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(publicVapidKey) });
                    }
                    const currentUser = localStorage.getItem('usuario_real') || 'Igor';
                    await fetch('/api/push/subscribe', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ usuario: currentUser, subscription: subscription })
                    });
                } catch(e) { console.error("❌ Erro no Push:", e); }
            }
        }

        function requestNotificationPermission() {
            if (Notification.permission === 'default') {
                Notification.requestPermission().then(perm => { if (perm === 'granted') registerPush(); });
            } else if (Notification.permission === 'granted') { registerPush(); }
        }
        
        window.addEventListener('load', requestNotificationPermission);
        window.addEventListener('themeChanged', requestNotificationPermission);

        function toggleTheme() {
            let current = localStorage.getItem('app_theme') || 'blue';
            let novo = current === 'blue' ? 'pink' : 'blue';
            localStorage.setItem('app_theme', novo);
            document.documentElement.setAttribute('data-theme', novo);
            window.dispatchEvent(new Event('themeChanged'));
        }

        const menu = document.getElementById('speedDialMenu');
        const overlay = document.getElementById('speedDialOverlay');
        let isSpeedDialOpen = false;

        function toggleSpeedDial() {
            isSpeedDialOpen = !isSpeedDialOpen;
            if (isSpeedDialOpen) {
                menu.classList.add('active'); overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                menu.classList.remove('active'); overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function abrirModalInteligente() {
            const url = window.location.pathname;
            if (url === '/entradas' && typeof abrirModalNovaEntrada === 'function') {
                abrirModalNovaEntrada();
            } else if (url === '/fixas' && typeof abrirModalNovaFixa === 'function') {
                abrirModalNovaFixa();
            } else if (url === '/variaveis' && typeof abrirModalNovaVar === 'function') {
                abrirModalNovaVar();
            } else {
                abrirModalDiaDia();
            }
        }

        function abrirModalDiaDia() { 
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 10);
            document.getElementById('diadia_vencimento').value = localISOTime; 
            document.getElementById('modalDiaDia').classList.remove('hidden'); 
        }
        function fecharModalDiaDia() { document.getElementById('modalDiaDia').classList.add('hidden'); }

        document.getElementById('formDiaDia').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnSalvarDiaDia'); btn.innerText = 'SALVANDO... ⏳'; btn.disabled = true;
            try {
                const res = await fetch('/api/despesas/nova', { method: 'POST', body: new FormData(e.target) });
                if (res.ok) {
                    fecharModalDiaDia(); e.target.reset();
                    if (typeof carregarDashboard === "function") { carregarDashboard(); } 
                    else if (typeof carregarH === "function") { carregarH(); }
                    else if (typeof carregarRotas === "function") { carregarRotas(); } 
                    else { window.location.reload(); }
                } else { alert("Erro ao salvar o gasto diário."); }
            } catch (error) { alert("Erro de rede."); } finally { btn.innerText = 'LANÇAR GASTO'; btn.disabled = false; }
        });

        // =========================================================================
        // GATILHO SECRETO DO BOTÃO + (PRESSIONAR POR 2 SEGUNDOS)
        // =========================================================================
        const btnCentral = document.getElementById('btnCentralPlus');
        let pressTimer;
        let longPressed = false;

        function startPress(e) {
            longPressed = false;
            pressTimer = setTimeout(() => {
                longPressed = true;
                iniciarCacaTesouro();
            }, 2000); // 2000ms = 2 segundos segurando
        }

        function cancelPress(e) {
            clearTimeout(pressTimer);
        }

        function handlePlusClick(e) {
            if (!longPressed) {
                abrirModalInteligente(); // Se foi só um clique rápido, abre a tela de despesas
            }
        }

        if (btnCentral) {
            btnCentral.addEventListener('touchstart', startPress, {passive: true});
            btnCentral.addEventListener('touchend', cancelPress);
            btnCentral.addEventListener('touchcancel', cancelPress);
            btnCentral.addEventListener('mousedown', startPress);
            btnCentral.addEventListener('mouseup', cancelPress);
            btnCentral.addEventListener('mouseleave', cancelPress);
            btnCentral.addEventListener('click', handlePlusClick);
        }

        // =========================================================================
        // MOTOR DO JOGO SECRETO: CAÇA AO TESOURO ❤️
        // =========================================================================
        
        let ctFaseAtual = 0;
        let ctTentativasFase8 = 3;
        let ctFase8ArmarioAberto = false;

        const ctFases = [
            {
                pergunta: "Quando o fogão não funciona aonde esquentamos a comida?",
                resposta: "microondas",
                msgTransicao: "E assim como a comida esquenta rapidinho ali, meu coração também derrete e acelera toda vez que você sorri pra mim. Vamos para a próxima pista..."
            },
            {
                pergunta: "Os moinhos de Holambra são lindos, o que será que tem lá? (Vá até o porta-chaves!)",
                resposta: "teamo",
                msgTransicao: "E eu te amo muito mais do que qualquer papel pode expressar! Cada momento ao seu lado é como caminhar no lugar mais lindo do mundo."
            },
            {
                pergunta: "Meu Deus quanta roupa suja, o que fazer? (Vá até a máquina!)",
                resposta: "voceeaamelhorescolhadaminhavida",
                msgTransicao: "Você não é só a melhor escolha, você é a minha única escolha. A vida é mais leve e faz muito mais sentido porque a gente divide até as tarefas chatas juntos."
            },
            {
                pergunta: "Se somar o dia do seu aniversário com o dia do meu qual o resultado?",
                resposta: "16",
                msgTransicao: "Nossos dias se somam e a nossa história se multiplica. Sou grato por poder celebrar todas as datas importantes da minha vida com você."
            },
            {
                pergunta: "Em que cidade está localizado o hotel que dormimos depois do nosso casamento?",
                resposta: "osasco",
                msgTransicao: "Aquele dia foi mágico, mas foi só o primeiro capítulo do nosso 'felizes para sempre'. Eu casaria com você todos os dias se fosse possível!"
            },
            {
                pergunta: "Em meio a tantas bagunças em cima daquele balcão o que será que a gente pode encontrar lá?",
                resposta: "aminhavidasemvocenaofariasentido",
                msgTransicao: "Literalmente não faria sentido algum. Você é a maior doçura dos meus dias (espero que essa trufa aí também esteja bem doce!). Prepare-se, estamos quase no fim..."
            },
            {
                pergunta: "A gente chega cansado do serviço do dia a dia corrido e a gente só quer encostar nossa cabeça aonde que eu faço isso?",
                resposta: "travesseiro",
                subPergunta: "Está correto! Mas para avançar, eu preciso do código secreto que está te esperando lá embaixo dele...",
                subResposta: "deus",
                msgTransicao: "E é exatamente a Ele que eu agradeço todas as noites antes de fechar os olhos. O maior presente que Deus me deu foi o privilégio de dividir o travesseiro e a vida com você."
            },
            {
                pergunta: "Hoje eu lembrei de uma coisa que você me disse há um tempo, era algo que você estava com muita vontade de experimentar. Acredito que você não vai adivinhar, mas vou te dar 3 tentativas agora.",
                resposta: "pudim",
                msgFinal: "Parabéns, meu amor! 🎉 Você é a melhor detetive, a melhor esposa e a mulher da minha vida. O seu tão desejado pudim está no armário da cozinha esperando por você! Aproveite cada pedaço, porque você merece o mundo inteiro. Te amo absurdamente!"
            }
        ];

        function ctNormalizar(texto) {
            return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]/g, "");
        }

        function iniciarCacaTesouro() {
            ctFaseAtual = 0;
            ctTentativasFase8 = 3;
            ctFase8ArmarioAberto = false;
            document.getElementById('cacaTesouroOverlay').classList.remove('hidden');
            renderCtBoasVindas();
        }

        function fecharCacaTesouro() {
            document.getElementById('cacaTesouroOverlay').classList.add('hidden');
        }

        function renderCtBoasVindas() {
            const container = document.getElementById('ctContent');
            container.innerHTML = `
                <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <div class="text-center pt-4">
                    <div class="text-6xl mb-4 heart-beat">❤️</div>
                    <h2 class="text-2xl font-black text-pink-600 mb-4">Oi, meu amor!</h2>
                    <p class="text-sm font-bold text-slate-600 mb-8 leading-relaxed">Achei que você merecia uma surpresa doce hoje. Mas para ganhar, vai ter que jogar... Topa o desafio?</p>
                    <button onclick="renderCtFase()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-xl transition">INICIAR BRINCADEIRA</button>
                </div>
            `;
        }

        function renderCtTransicao() {
            const container = document.getElementById('ctContent');
            const faseAnterior = ctFases[ctFaseAtual - 1];
            
            container.innerHTML = `
                <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <div class="text-center pt-2">
                    <div class="text-4xl mb-4">✨</div>
                    <p class="text-sm font-black text-rose-600 mb-8 leading-relaxed italic">"${faseAnterior.msgTransicao}"</p>
                    <button onclick="renderCtFase()" class="w-full py-4 bg-pink-100 text-pink-600 border border-pink-200 rounded-2xl font-black tracking-widest active:scale-95 shadow-sm transition">CONTINUAR ❤️</button>
                </div>
            `;
        }

        function renderCtFase() {
            const container = document.getElementById('ctContent');
            const fase = ctFases[ctFaseAtual];
            let extraHTML = '';

            if (ctFaseAtual === 6 && ctFase7SubPergunta) {
                // Caso especial fase 7 (Travesseiro) -> Código Deus
                container.innerHTML = `
                    <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    <div class="text-center pt-2">
                        <span class="px-3 py-1 bg-pink-100 text-pink-600 font-black text-[10px] rounded-full uppercase tracking-widest mb-4 inline-block">Fase ${ctFaseAtual + 1} - Código Secreto</span>
                        <p class="text-sm font-black text-slate-700 mb-6">${fase.subPergunta}</p>
                        <input type="text" id="ctResposta" placeholder="Digite o código aqui..." class="w-full p-4 rounded-2xl bg-pink-50 border border-pink-100 text-slate-800 font-bold outline-none text-center mb-4">
                        <p id="ctErro" class="text-xs font-bold text-red-500 mb-4 hidden">Código incorreto! Tente de novo.</p>
                        <button onclick="validarCtFase()" class="w-full py-4 bg-pink-500 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-xl transition">VALIDAR CÓDIGO</button>
                    </div>
                `;
                return;
            }

            if (ctFaseAtual === 7) {
                // Caso especial fase 8 (Pudim)
                if (ctFase8ArmarioAberto) {
                    container.innerHTML = `
                        <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        <div class="text-center pt-2">
                            <div class="text-4xl mb-4">👀</div>
                            <p class="text-sm font-black text-slate-700 mb-6">O que era que estava te esperando lá no armário da cozinha?</p>
                            <input type="text" id="ctResposta" placeholder="Digite aqui..." class="w-full p-4 rounded-2xl bg-pink-50 border border-pink-100 text-slate-800 font-bold outline-none text-center mb-4">
                            <p id="ctErro" class="text-xs font-bold text-red-500 mb-4 hidden">Ainda não... olha de novo!</p>
                            <button onclick="validarCtFase()" class="w-full py-4 bg-pink-500 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-xl transition">CONFIRMAR</button>
                        </div>
                    `;
                    return;
                } else {
                    extraHTML = `<p class="text-[10px] font-black text-rose-500 uppercase mb-4 tracking-widest">Tentativas restantes: ${ctTentativasFase8}</p>`;
                }
            }

            // Render Padrão
            container.innerHTML = `
                <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <div class="text-center pt-2">
                    <span class="px-3 py-1 bg-pink-100 text-pink-600 font-black text-[10px] rounded-full uppercase tracking-widest mb-4 inline-block">Fase ${ctFaseAtual + 1} de ${ctFases.length}</span>
                    <p class="text-sm font-black text-slate-700 mb-6 leading-relaxed">${fase.pergunta}</p>
                    ${extraHTML}
                    <input type="text" id="ctResposta" placeholder="Sua resposta..." class="w-full p-4 rounded-2xl bg-pink-50 border border-pink-100 text-slate-800 font-bold outline-none text-center mb-4">
                    <p id="ctErro" class="text-xs font-bold text-red-500 mb-4 hidden">Ops, resposta errada! Tente novamente.</p>
                    <button onclick="validarCtFase()" class="w-full py-4 bg-pink-500 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-xl transition">CONFIRMAR</button>
                </div>
            `;
        }

        let ctFase7SubPergunta = false;

        function validarCtFase() {
            const input = document.getElementById('ctResposta');
            const erroEl = document.getElementById('ctErro');
            const respostaDigitada = ctNormalizar(input.value);
            const fase = ctFases[ctFaseAtual];

            let respostaCorreta = fase.resposta;
            
            if (ctFaseAtual === 6 && ctFase7SubPergunta) {
                respostaCorreta = fase.subResposta; // Validando código do travesseiro
            }

            if (respostaDigitada === respostaCorreta) {
                erroEl.classList.add('hidden');
                
                // Se acertou travesseiro pela 1x, ativa subpergunta e renderiza de novo.
                if (ctFaseAtual === 6 && !ctFase7SubPergunta) {
                    ctFase7SubPergunta = true;
                    renderCtFase();
                    return;
                }

                // Se acertou a última (Pudim)
                if (ctFaseAtual === 7) {
                    renderCtVitoria();
                    return;
                }

                // Avança Fase Normal
                ctFaseAtual++;
                ctFase7SubPergunta = false;
                renderCtTransicao();
            } else {
                // Tratamento de erro
                if (ctFaseAtual === 7 && !ctFase8ArmarioAberto) {
                    ctTentativasFase8--;
                    if (ctTentativasFase8 <= 0) {
                        const container = document.getElementById('ctContent');
                        container.innerHTML = `
                            <button onclick="fecharCacaTesouro()" class="absolute top-4 right-4 text-pink-300 hover:text-pink-600 bg-pink-50 p-2 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            <div class="text-center pt-2">
                                <div class="text-4xl mb-4">😅</div>
                                <h3 class="text-lg font-black text-slate-800 mb-2">Tudo bem não ter acertado!</h3>
                                <p class="text-sm font-bold text-slate-600 mb-8 leading-relaxed">Então eu vou falar para você onde encontrar: Levante e vá até o armário da cozinha.</p>
                                <button onclick="abrirArmarioPudim()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black tracking-widest active:scale-95 shadow-xl transition">ENCONTREI!</button>
                            </div>
                        `;
                        return;
                    } else {
                        renderCtFase(); // Re-renderiza para atualizar numero de tentativas
                        const novoErro = document.getElementById('ctErro');
                        novoErro.innerText = `Hummm não é isso!`;
                        novoErro.classList.remove('hidden');
                    }
                } else {
                    erroEl.classList.remove('hidden');
                    input.value = '';
                }
            }
        }

        function abrirArmarioPudim() {
            ctFase8ArmarioAberto = true;
            renderCtFase();
        }

        function renderCtVitoria() {
            const container = document.getElementById('ctContent');
            const faseFinal = ctFases[ctFases.length - 1];
            
            container.innerHTML = `
                <div class="text-center py-6">
                    <div class="text-6xl mb-6 heart-beat">🍮❤️</div>
                    <h2 class="text-2xl font-black text-rose-600 mb-4">Fim do Jogo!</h2>
                    <p class="text-sm font-black text-slate-700 mb-8 leading-relaxed italic">"${faseFinal.msgFinal}"</p>
                    <button onclick="fecharCacaTesouro()" class="w-full py-4 bg-pink-100 text-pink-600 border border-pink-200 rounded-2xl font-black tracking-widest active:scale-95 shadow-sm transition">RESGATAR MEU PRÊMIO 💖</button>
                </div>
            `;
        }

    </script>
</body>
</html>
