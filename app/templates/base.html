<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f3f4f6">
    <title>Gestão TI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f3f6; /* Fundo cinza suave da imagem */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(200, 200, 200, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(200, 200, 200, 0.2) 0%, transparent 40%);
            min-height: 100vh;
            color: #2d3748;
            padding-bottom: 110px; 
            padding-top: 20px;
        }
        
        .soft-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Botão Laranja vibrante do novo padrão */
        .btn-active {
            background: #ff8c00; 
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <main class="p-4 max-w-lg mx-auto">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-6 w-[90%] max-w-sm left-1/2 -translate-x-1/2 soft-glass flex justify-around items-center px-2 py-3 z-50 rounded-[35px]">
        <a href="/" class="flex flex-col items-center group">
            <div class="p-2 rounded-xl transition-all group-active:scale-90">
                <span class="text-2xl">🏠</span>
            </div>
        </a>
        
        <a href="/nova-conta" class="flex flex-col items-center group relative">
            <div class="btn-active w-12 h-12 rounded-full flex items-center justify-center shadow-lg text-white group-active:scale-95 transition-transform">
                <span class="text-2xl font-light">+</span>
            </div>
        </a>
        
        <a href="/historico" class="flex flex-col items-center group">
            <div class="p-2 rounded-xl transition-all group-active:scale-90">
                <span class="text-2xl">📊</span>
            </div>
        </a>
    </nav>
</body>
</html>
