<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8fafc">
    <title>Gestão TI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.15), transparent 40%),
                #f8fafc;
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e293b;
            /* Aumentei o padding inferior para a lista não ficar escondida atrás do menu flutuante */
            padding-bottom: 120px; 
            padding-top: 10px;
        }
        
        ::-webkit-scrollbar { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>
<body>
    <main class="p-4 max-w-lg mx-auto">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-6 w-[92%] max-w-sm left-1/2 -translate-x-1/2 glass-card flex justify-around items-center px-2 py-3 z-50 rounded-3xl shadow-2xl shadow-indigo-900/10 transition-all">
        <a href="/" class="flex flex-col items-center text-slate-500 hover:text-indigo-600 transition focus:text-indigo-600 w-16">
            <span class="text-[22px] mb-0.5">🏠</span>
            <span class="text-[9px] font-bold uppercase tracking-wide">Início</span>
        </a>
        
        <a href="/nova-conta" class="flex flex-col items-center group relative">
            <div class="bg-indigo-600 w-14 h-14 rounded-full flex items-center justify-center -mt-10 shadow-lg shadow-indigo-500/40 text-white border-4 border-white/90 group-active:scale-95 transition-transform">
                <span class="text-3xl font-light mb-1">+</span>
            </div>
        </a>
        
        <a href="/historico" class="flex flex-col items-center text-slate-500 hover:text-indigo-600 transition focus:text-indigo-600 w-16">
            <span class="text-[22px] mb-0.5">📊</span>
            <span class="text-[9px] font-bold uppercase tracking-wide">Histórico</span>
        </a>
    </nav>
</body>
</html>
