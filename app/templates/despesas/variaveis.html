{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl ultra-glass flex items-center justify-center text-slate-500 hover:text-slate-800 transition active:scale-90"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></a>
    <h2 class="text-xl font-black text-slate-800 tracking-tight">Contas Parceladas</h2>
</div>

<div class="flex justify-between items-center mb-6 ultra-glass p-2 rounded-full">
    <button onclick="mudarMes(-1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-theme transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
    <h2 id="mesDisplay" class="text-xs font-bold uppercase tracking-widest text-slate-700">Carregando...</h2>
    <button onclick="mudarMes(1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-theme transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
</div>

<p class="text-[10px] text-slate-400 uppercase tracking-widest text-center mb-2 animate-pulse">Deslize a conta para a direita para pagar ➡</p>
<div class="space-y-4 mb-32" id="lista-parceladas"></div>

<div id="modalNovaVar" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 transition-opacity">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto pb-8">
        <button onclick="document.getElementById('modalNovaVar').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 class="text-lg font-black text-slate-800 mb-6">Conta Parcelada</h3>
        <form id="formVar" class="space-y-4">
            
            <input type="hidden" name="tipo_despesa" value="Variável">
            
            <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Descrição</label><input type="text" name="descricao" required class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 font-bold outline-none focus:border-orange-400"></div>
            
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Categoria</label>
                <select id="select_categoria_var" name="categoria" required class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 font-bold outline-none text-slate-700 focus:border-orange-400" onchange="verificarCategoriaCustomizada('var')">
                    <option value="Agua">Água</option>
                    <option value="Aluguel">Aluguel</option>
                    <option value="Carro">Carro</option>
                    <option value="Faculdade">Faculdade</option>
                    <option value="Luz">Luz</option>
                    <option value="Mercado">Mercado</option>
                    <option value="Noh">Noh</option>
                    <option value="Vivo">Vivo</option>
                    <option value="custom" class="text-orange-500 font-black">➕ Digitar outra...</option>
                </select>
                <input type="text" id="input_categoria_var" placeholder="Qual é a categoria?" class="w-full p-3 mt-2 rounded-xl bg-orange-50/50 border border-orange-100 text-orange-800 font-bold outline-none hidden focus:border-orange-400 placeholder:text-orange-300">
            </div>

            <div class="flex gap-2">
                <div class="w-1/2"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Valor da Parcela</label><input type="number" step="0.01" name="valor" required class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 font-black outline-none focus:border-orange-400"></div>
                <div class="w-1/2"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Vencimento</label><input type="date" name="data_vencimento" required class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 text-sm outline-none"></div>
            </div>
            
            <div class="flex gap-2">
                <div class="w-1/2"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Previsão Pago</label><input type="date" name="data_pretensao" class="w-full p-3 rounded-xl bg-orange-50 border border-orange-100 text-sm outline-none"></div>
                <div class="w-1/2"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Quem Paga?</label><select name="responsavel_pagamento" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 font-bold outline-none"><option value="Igor">Igor</option><option value="Thaynara">Thaynara</option></select></div>
            </div>
            
            <div class="p-3 rounded-2xl bg-orange-50 border border-orange-100">
                <input type="hidden" name="recorrente" value="true">
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="text-[9px] uppercase text-orange-600 font-bold ml-1">Parcela Atual</label><input type="number" name="parcela_atual" value="1" min="1" class="w-full p-2 rounded-xl bg-white border border-orange-100 text-center font-bold outline-none focus:border-orange-400"></div>
                        <div class="w-1/2"><label class="text-[9px] uppercase text-orange-600 font-bold ml-1">Total de Meses</label><input type="number" name="total_parcelas" value="2" min="1" class="w-full p-2 rounded-xl bg-white border border-orange-100 text-center font-bold outline-none focus:border-orange-400"></div>
                    </div>
                    <div class="flex items-center gap-2 mt-1 pt-2 border-t border-orange-200/50">
                        <input type="checkbox" id="repetir_previsao_var" name="repetir_previsao" value="true" class="w-4 h-4 accent-orange-500" checked>
                        <label for="repetir_previsao_var" class="text-[10px] font-bold text-orange-800">Repetir previsão de pagamento?</label>
                    </div>
                </div>
            </div>
            
            <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Observações</label><textarea name="observacao" rows="2" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none text-sm"></textarea></div>
            <button type="submit" id="btnSalvarVar" class="w-full py-4 btn-active text-white rounded-2xl font-bold active:scale-95 transition shadow-lg">Guardar Conta Parcelada</button>
        </form>
    </div>
</div>

<div id="modalDetalhes" class="hidden fixed inset-0 z-[70] flex flex-col items-center justify-end sm:justify-center bg-slate-900/40 backdrop-blur-md p-4 pb-24 transition-opacity">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative">
        <button onclick="fecharModais()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 id="det_nome" class="text-xl font-black text-slate-800 mb-1 pr-8">--</h3>
        <p id="det_parcela" class="text-xs font-bold text-theme uppercase tracking-widest mb-6">--</p>
        <div class="space-y-4 mb-6">
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Valor</span><span id="det_valor" class="text-sm font-black text-slate-800">--</span></div>
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Vencimento</span><span id="det_vence" class="text-sm font-bold text-orange-600">--</span></div>
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Data Prevista</span><span id="det_prev" class="text-sm font-bold text-theme">--</span></div>
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Responsável</span><span id="det_resp" class="text-sm font-bold text-slate-800">--</span></div>
        </div>
        <div class="flex gap-2">
            <button id="btnEditarAbrir" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs uppercase tracking-wider hover:bg-slate-200">Editar</button>
            <button id="btnExcluirAtivo" class="w-14 bg-red-50 text-red-500 flex items-center justify-center rounded-2xl hover:bg-red-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
        </div>
    </div>
</div>

<div id="modalEditar" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative">
        <button onclick="fecharModais()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 class="text-lg font-black text-slate-800 mb-4">Corrigir Conta</h3>
        <form id="formEditar" class="space-y-3">
            <input type="hidden" id="edit_id">
            
            <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Descrição</label><input type="text" id="edit_descricao" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 font-medium" required></div>
            
            <div>
                <label class="text-[10px] font-bold text-orange-500 uppercase ml-1">Categoria (Muda todas as parcelas)</label>
                <select id="edit_categoria" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 font-bold outline-none text-slate-700 focus:border-orange-400" required onchange="verificarCategoriaCustomizadaEdit('var')">
                    <option value="Agua">Água</option>
                    <option value="Aluguel">Aluguel</option>
                    <option value="Carro">Carro</option>
                    <option value="Faculdade">Faculdade</option>
                    <option value="Luz">Luz</option>
                    <option value="Mercado">Mercado</option>
                    <option value="Noh">Noh</option>
                    <option value="Vivo">Vivo</option>
                    <option value="custom" class="text-orange-500 font-black">➕ Digitar outra...</option>
                </select>
                <input type="text" id="edit_input_categoria" placeholder="Qual é a categoria?" class="w-full p-3 mt-2 rounded-xl bg-orange-50/50 border border-orange-100 text-orange-800 font-bold outline-none hidden focus:border-orange-400">
            </div>

            <div class="flex gap-2">
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Valor</label><input type="number" step="0.01" id="edit_valor" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 font-bold" required></div>
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Vencimento</label><input type="date" id="edit_data" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm" required></div>
            </div>
            <div class="flex gap-2">
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Data Prevista</label><input type="date" id="edit_prev" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm"></div>
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Responsável</label><select id="edit_responsavel" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 font-medium"><option value="Igor">Igor</option><option value="Thaynara">Thaynara</option></select></div>
            </div>
            <button type="submit" class="w-full py-4 mt-4 btn-active text-white rounded-2xl font-bold active:scale-95 transition">Salvar Alterações</button>
        </form>
    </div>
</div>

<div id="modalPagamento" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 transition-opacity">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl text-center relative">
        <button onclick="fecharModais(); reverterCard(contaEmFocoId);" class="absolute top-4 right-4 text-slate-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 class="text-xl font-black text-slate-800 mb-6">Pagar Conta</h3>
        <div class="space-y-3">
            <button id="btnAnexarRecibo" class="w-full py-4 btn-active text-white rounded-2xl font-bold flex items-center justify-center gap-2">Anexar Recibo</button>
            <button id="btnApenasBaixa" class="w-full py-4 bg-slate-100 text-slate-700 rounded-2xl font-bold">Apenas Dar Baixa</button>
        </div>
    </div>
</div>
<input type="file" id="fileComprovante" class="hidden" accept=".pdf, image/*">

<script>
    let currentData = new Date(); let contaEmFocoId = null;
    const formatarMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const formatarData = (ds) => { if (!ds || !ds.includes('-')) return '--/--'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
    
    // --- NOVA FUNÇÃO PARA EDIÇÃO DE CATEGORIA ---
    function verificarCategoriaCustomizadaEdit(contexto) {
        const select = document.getElementById('edit_categoria');
        const input = document.getElementById('edit_input_categoria');
        
        if (select.value === 'custom') {
            input.classList.remove('hidden');
            input.required = true;
            input.focus();
        } else {
            input.classList.add('hidden');
            input.required = false;
        }
    }

    const mudarMes = (d) => { 
        currentData.setMonth(currentData.getMonth() + d); 
        const mesGlobal = { mes: currentData.getMonth() + 1, ano: currentData.getFullYear() };
        localStorage.setItem('mesGlobalData', JSON.stringify(mesGlobal));
        carregarParceladas(); 
    };

    const carregarParceladas = async () => {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mesDisplay').innerText = `${meses[currentData.getMonth()]} / ${currentData.getFullYear()}`;
        const res = await fetch(`/api/despesas?mes=${currentData.getMonth()+1}&ano=${currentData.getFullYear()}`);
        const todas = await res.json();
        
        const parceladasGlobais = todas.filter(x => x.tipo_despesa === 'Variável' && !x.pago);
        const cont = document.getElementById('lista-parceladas'); cont.innerHTML = '';
        if(parceladasGlobais.length === 0) { cont.innerHTML = `<div class="text-center py-8 ultra-glass rounded-3xl"><p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Tudo em dia!</p></div>`; return; }

        parceladasGlobais.forEach(x => {
            const descSafe = x.descricao.replace(/'/g, "\\'");
            const obsSafe = (x.observacao || "").replace(/'/g, "\\'").replace(/\n/g, " ");
            const fonteSafe = (x.fonte_pagamento || "Geral");
            const catSafe = (x.categoria || "Geral").replace(/'/g, "\\'");
            const badgeParcela = x.total_parcelas > 1 ? `<p class="text-[10px] text-orange-600 font-black tracking-widest uppercase mt-0.5">Parcela ${x.parcela_atual}/${x.total_parcelas}</p>` : '<p class="text-[10px] text-slate-400 font-black tracking-widest uppercase mt-0.5">Mês Único</p>';
            
            cont.innerHTML += `
                <div id="conta-card-${x.id}" class="relative rounded-[28px] shadow-sm overflow-hidden swipe-container bg-transparent">
                    <div class="swipe-bg absolute inset-0 bg-emerald-500 flex items-center pl-6 text-white font-black text-lg z-0" style="opacity: 0; transition: opacity 0.1s;">PAGO</div>
                    <div class="swipe-card relative z-10 ultra-glass p-5 rounded-[28px] flex justify-between items-center cursor-pointer border border-white/50" data-id="${x.id}"
                         onclick="if(!isSwiping) abrirModalDetalhes(${x.id}, '${descSafe}', ${x.valor}, '${x.data_vencimento}', '${x.data_pretensao || ''}', '${x.responsavel_pagamento}', '${fonteSafe}', '${obsSafe}', ${x.parcela_atual}, ${x.total_parcelas}, '${catSafe}')">
                        <div class="flex items-start gap-3 w-[70%] pointer-events-none">
                            <div class="w-10 h-10 mt-1 rounded-xl bg-white/70 flex items-center justify-center text-theme shadow-sm border border-white">💳</div>
                            <div class="truncate flex-1">
                                <p class="font-bold text-slate-800 text-sm truncate leading-tight">${x.descricao}</p>
                                ${badgeParcela}
                                <p class="text-[9px] font-bold text-slate-500 mt-1">📅 Venc: ${formatarData(x.data_vencimento)}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end justify-center h-full gap-1 w-[30%] pointer-events-none">
                            <p class="font-black text-slate-800 text-sm">${formatarMoeda(x.valor)}</p>
                            <span class="text-[7px] font-black text-theme uppercase bg-theme-light px-2 py-0.5 rounded-md mt-1 line-clamp-1 text-center max-w-full">${x.categoria}</span>
                        </div>
                    </div>
                </div>`;
        });
    };

    const abrirModalNovaVar = () => document.getElementById('modalNovaVar').classList.remove('hidden');

    document.getElementById('formVar').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const btn = document.getElementById('btnSalvarVar'); 
        btn.innerText = 'LANÇANDO... ⏳'; 
        btn.disabled = true;
        
        const formData = new FormData(e.target);
        
        if (formData.get('categoria') === 'custom') {
            const customCat = document.getElementById('input_categoria_var').value;
            if(customCat && customCat.trim() !== '') {
                formData.set('categoria', customCat.trim());
            } else {
                alert("Por favor, digite o nome da categoria.");
                btn.innerText = 'Guardar Conta Parcelada'; btn.disabled = false;
                return;
            }
        }

        await fetch('/api/despesas/nova', { method: 'POST', body: formData });
        
        document.getElementById('modalNovaVar').classList.add('hidden'); 
        btn.innerText = 'Guardar Conta Parcelada'; btn.disabled = false;
        e.target.reset(); 
        document.getElementById('input_categoria_var').classList.add('hidden');
        carregarParceladas();
    });

    const fecharModais = () => { document.querySelectorAll('[id^="modal"]').forEach(m => { if(m.id !== 'modalNovaVar') m.classList.add('hidden'); }); };

    const abrirModalDetalhes = (id, desc, valor, dataV, dataP, resp, fonte, obs, p_atual, t_parc, cat) => {
        document.getElementById('det_nome').innerText = desc;
        document.getElementById('det_parcela').innerText = t_parc > 1 ? `Parcela ${p_atual} de ${t_parc}` : 'Conta Parcelada / Mês Único';
        document.getElementById('det_valor').innerText = formatarMoeda(valor);
        document.getElementById('det_vence').innerText = formatarData(dataV);
        document.getElementById('det_prev').innerText = dataP ? formatarData(dataP) : 'Não definida';
        document.getElementById('det_resp').innerText = resp;
        
        document.getElementById('btnEditarAbrir').onclick = () => {
            document.getElementById('edit_id').value = id; document.getElementById('edit_descricao').value = desc;
            document.getElementById('edit_valor').value = valor; document.getElementById('edit_data').value = dataV;
            document.getElementById('edit_prev').value = dataP || ''; document.getElementById('edit_responsavel').value = resp;

            const selCat = document.getElementById('edit_categoria');
            const inCat = document.getElementById('edit_input_categoria');
            
            let optionExists = Array.from(selCat.options).some(opt => opt.value === cat);
            if(optionExists) {
                selCat.value = cat;
                inCat.classList.add('hidden');
                inCat.required = false;
            } else {
                selCat.value = 'custom';
                inCat.value = cat;
                inCat.classList.remove('hidden');
                inCat.required = true;
            }

            document.getElementById('modalEditar').classList.remove('hidden');
        };

        document.getElementById('btnExcluirAtivo').onclick = async () => {
            let params = '';
            if (t_parc > 1) {
                const excTodas = confirm("Esta é uma conta com parcelas. Deseja excluir TODAS as parcelas futuras desta conta?\n\n[OK] = Excluir TODAS as parcelas\n[Cancelar] = Excluir SÓ ESTA");
                if (excTodas) params = '?todas=true';
            } else { if(!confirm("Confirmar exclusão desta conta?")) return; }
            await fetch(`/api/despesas/${id}${params}`, { method: 'DELETE' }); fecharModais(); carregarParceladas();
        };
        document.getElementById('modalDetalhes').classList.remove('hidden');
    };

    document.getElementById('formEditar').addEventListener('submit', async (e) => {
        e.preventDefault();

        let catFinal = document.getElementById('edit_categoria').value;
        if(catFinal === 'custom') {
            catFinal = document.getElementById('edit_input_categoria').value.trim();
        }
        if(!catFinal) { alert('Informe a categoria!'); return; }

        const dados = { 
            descricao: document.getElementById('edit_descricao').value, 
            valor: parseFloat(document.getElementById('edit_valor').value), 
            data_vencimento: document.getElementById('edit_data').value, 
            data_pretensao: document.getElementById('edit_prev').value, 
            responsavel_pagamento: document.getElementById('edit_responsavel').value,
            categoria: catFinal
        };
        await fetch(`/api/despesas/${document.getElementById('edit_id').value}/editar`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
        fecharModais(); carregarParceladas();
    });

    let isSwiping = false, startX = 0, currentX = 0, swipeTarget = null, swipeBg = null;
    document.addEventListener('touchstart', e => { const card = e.target.closest('.swipe-card'); if(!card) return; swipeTarget = card; swipeBg = card.previousElementSibling; startX = e.touches[0].clientX; card.style.transition = 'none'; if(swipeBg) swipeBg.style.transition = 'none'; isSwiping = false; }, {passive: true});
    document.addEventListener('touchmove', e => { if(!swipeTarget) return; currentX = e.touches[0].clientX - startX; if(currentX > 10) isSwiping = true; if(currentX > 0) { swipeTarget.style.transform = `translateX(${currentX}px)`; if (swipeBg) swipeBg.style.opacity = Math.min(currentX / 100, 1); } }, {passive: true});
    document.addEventListener('touchend', () => { if(!swipeTarget) return; swipeTarget.style.transition = 'transform 0.3s ease'; if (swipeBg) swipeBg.style.transition = 'opacity 0.3s ease'; if(currentX > 100) { swipeTarget.style.transform = `translateX(150%)`; if(swipeBg) swipeBg.style.opacity = '1'; contaEmFocoId = swipeTarget.getAttribute('data-id'); setTimeout(() => document.getElementById('modalPagamento').classList.remove('hidden'), 250); } else { reverterCard(swipeTarget.getAttribute('data-id')); } setTimeout(() => { swipeTarget = null; swipeBg = null; currentX = 0; isSwiping = false; }, 300); });
    const reverterCard = (id) => { const card = document.querySelector(`.swipe-card[data-id="${id}"]`); if(card) { card.style.transform = `translateX(0px)`; if(card.previousElementSibling) card.previousElementSibling.style.opacity = '0'; } };
    
    document.getElementById('btnAnexarRecibo').onclick = () => { const input = document.getElementById('fileComprovante'); input.value = ''; input.onchange = async () => { fecharModais(); await dispararPagamento(input.files[0]); }; input.click(); };
    document.getElementById('btnApenasBaixa').onclick = async () => { fecharModais(); await dispararPagamento(null); };
    const dispararPagamento = async (file) => { const cardNode = document.getElementById(`conta-card-${contaEmFocoId}`); if(cardNode) { cardNode.style.transition = "all 0.3s"; cardNode.style.opacity = "0"; setTimeout(() => cardNode.remove(), 300); } const formData = new FormData(); if(file) formData.append('comprovante', file); await fetch(`/api/despesas/${contaEmFocoId}/pagar`, { method: 'POST', body: formData }); };

    document.addEventListener("DOMContentLoaded", () => {
        const mesGlobalStr = localStorage.getItem('mesGlobalData');
        if (mesGlobalStr) {
            const mesGlobal = JSON.parse(mesGlobalStr);
            currentData = new Date(mesGlobal.ano, mesGlobal.mes - 1, 1);
        }
        carregarParceladas();
    });
</script>
