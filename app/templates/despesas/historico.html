{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl ultra-glass flex items-center justify-center text-slate-500 hover:text-slate-800 transition active:scale-90">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>
    <h2 class="text-xl font-black text-slate-800">Concluídos</h2>
</div>

<div class="flex justify-between items-center mb-6 ultra-glass p-2 rounded-full">
    <button onclick="mudarMes(-1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-orange-500 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
    <h2 id="mesDisplayHist" class="text-xs font-bold uppercase tracking-widest text-slate-700">Carregando...</h2>
    <button onclick="mudarMes(1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-orange-500 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
</div>

<div id="lista-historico" class="space-y-4"></div>

<div id="modalExcluirHist" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 transition-opacity">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl text-center relative">
        <h3 class="text-xl font-black text-slate-800 mb-2">Atenção!</h3>
        <p class="text-sm font-medium text-slate-500 mb-6">Deseja apagar esta conta do histórico? Essa ação não pode ser desfeita e o comprovante será perdido.</p>
        <div class="flex gap-2">
            <button onclick="fecharModalHist()" class="w-1/2 py-4 bg-slate-100 text-slate-700 rounded-2xl font-bold hover:bg-slate-200 active:scale-95 transition">Cancelar</button>
            <button id="btnConfirmarExclusaoHist" class="w-1/2 py-4 bg-red-500 text-white rounded-2xl font-bold hover:bg-red-600 active:scale-95 transition">Apagar</button>
        </div>
    </div>
</div>

<script>
    let dataHist = new Date();
    let idParaExcluir = null;

    const formatarData = (ds) => { if (!ds) return '--/--'; const [y,m,d] = ds.split('-'); return `${d}/${m}`; };

    const atualizarDisplayMes = () => {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mesDisplayHist').innerText = `${meses[dataHist.getMonth()]} / ${dataHist.getFullYear()}`;
    };

    const mudarMes = (d) => { dataHist.setMonth(dataHist.getMonth() + d); carregarH(); };

    const carregarH = async () => {
        atualizarDisplayMes();
        const c = document.getElementById('lista-historico');
        const r = await fetch(`/api/despesas?mes=${dataHist.getMonth()+1}&ano=${dataHist.getFullYear()}`);
        const d = (await r.json()).filter(x => x.pago);
        
        c.innerHTML = d.length ? '' : '<p class="text-center text-slate-500 text-sm font-bold mt-10 uppercase tracking-widest">Nada por aqui.</p>';
        d.forEach(x => {
            const onClickAttr = x.tem_comprovante ? `onclick="window.open('/comprovante/${x.id}', '_blank')"` : `onclick="alert('Esta conta foi dada baixa sem comprovante anexado.')"`;
            const cursorClass = x.tem_comprovante ? 'cursor-pointer hover:bg-white/40' : 'opacity-80';
            const iconBadge = x.tem_comprovante 
                ? `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`
                : `<svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

            c.innerHTML += `
                <div class="p-5 rounded-[28px] ultra-glass flex justify-between items-center transition active:scale-95">
                    <div ${onClickAttr} class="flex items-center gap-4 w-[80%] ${cursorClass}">
                        <div class="min-w-[42px] h-[42px] rounded-2xl bg-white/70 flex items-center justify-center shadow-sm border border-white">
                            ${iconBadge}
                        </div>
                        <div>
                            <p class="font-bold text-slate-700 text-sm leading-tight">${x.descricao}</p>
                            <p class="text-[9px] font-bold text-slate-500 mt-0.5">Vencimento original: ${formatarData(x.data_vencimento)}</p>
                            <p class="text-[9px] font-black text-emerald-600 uppercase tracking-wider mt-1">PAGO POR: ${x.responsavel_pagamento}</p>
                        </div>
                    </div>
                    
                    <div class="w-[20%] flex flex-col items-end gap-3 border-l border-white/40 pl-2">
                        <button onclick="abrirModalExcluir(${x.id})" class="text-slate-300 hover:text-red-500 transition p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        <p class="font-black text-slate-800 text-xs">${Number(x.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                    </div>
                </div>`;
        });
    };
    
    const abrirModalExcluir = (id) => { idParaExcluir = id; document.getElementById('modalExcluirHist').classList.remove('hidden'); };
    const fecharModalHist = () => { document.getElementById('modalExcluirHist').classList.add('hidden'); };
    
    document.getElementById('btnConfirmarExclusaoHist').onclick = async () => {
        fecharModalHist();
        await fetch(`/api/despesas/${idParaExcluir}`, { method: 'DELETE' }); 
        carregarH();
    };

    document.addEventListener("DOMContentLoaded", carregarH);
</script>
{% endblock %}
