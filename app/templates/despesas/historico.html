{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <a href="/" class="w-12 h-12 rounded-2xl ultra-glass flex items-center justify-center text-slate-500 hover:text-slate-800 transition active:scale-90"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></a>
        <h2 class="text-xl font-black text-slate-800 tracking-tight">Histórico</h2>
    </div>
</div>

<div class="flex justify-between items-center mb-6 ultra-glass p-2 rounded-full">
    <button onclick="mudarMes(-1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-theme transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
    <h2 id="mesDisplayHist" class="text-xs font-bold uppercase tracking-widest text-slate-700">Carregando...</h2>
    <button onclick="mudarMes(1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-theme transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
</div>

<div class="flex p-1 bg-white/50 rounded-2xl mb-6 shadow-inner border border-white/60">
    <button onclick="setAba('Fixa')" id="aba-Fixa" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl bg-white text-theme shadow-sm transition">Fixas</button>
    <button onclick="setAba('Variável')" id="aba-Variável" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl text-slate-500 hover:bg-white/50 transition">Parceladas</button>
    <button onclick="setAba('Diária')" id="aba-Diária" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl text-slate-500 hover:bg-white/50 transition">Diário</button>
</div>

<div id="filtros-diaria-container" class="hidden mb-4">
    <div class="flex gap-2">
        <select id="select-modo" onchange="mudarModoFiltro(this.value)" class="p-3 rounded-xl bg-white border border-white/60 text-[10px] uppercase tracking-widest font-bold text-slate-600 outline-none shadow-sm cursor-pointer">
            <option value="mes">Mês Inteiro</option>
            <option value="semana">Por Semana</option>
            <option value="dia">Por Dia Específico</option>
        </select>
        <select id="select-param" onchange="mudarParamFiltro(this.value)" class="hidden flex-1 p-3 rounded-xl bg-theme-light border border-white/60 text-xs font-bold text-theme outline-none shadow-sm cursor-pointer">
        </select>
    </div>
</div>

<div id="lista-historico" class="space-y-4 mb-32"></div>

<div id="modalDetalhesDiaria" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-end sm:justify-center bg-slate-900/40 backdrop-blur-md p-4 pb-24 transition-opacity">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative">
        <button onclick="fecharModais()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 id="det_nome" class="text-xl font-black text-slate-800 mb-1 pr-8">--</h3>
        <p class="text-xs font-bold text-theme uppercase tracking-widest mb-6">Gasto do Dia-a-Dia</p>
        <div class="space-y-4 mb-6">
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Valor</span><span id="det_valor" class="text-sm font-black text-slate-800">--</span></div>
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Data Pago</span><span id="det_pag" class="text-sm font-bold text-emerald-600">--</span></div>
            <div class="flex justify-between border-b border-slate-100 pb-2"><span class="text-xs font-bold text-slate-400 uppercase">Responsável</span><span id="det_resp" class="text-sm font-bold text-slate-800">--</span></div>
        </div>
        <div class="flex gap-2">
            <button id="btnEditarAbrir" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs uppercase tracking-wider hover:bg-slate-200">Editar</button>
            <button id="btnExcluirAtivo" class="w-14 bg-red-50 text-red-500 flex items-center justify-center rounded-2xl hover:bg-red-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
        </div>
    </div>
</div>

<div id="modalEditarDiaria" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
    <div class="w-full max-w-sm bg-white rounded-[32px] p-6 shadow-2xl relative">
        <button onclick="fecharModais()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <h3 class="text-lg font-black text-slate-800 mb-4">Corrigir Gasto</h3>
        <form id="formEditar" class="space-y-3">
            <input type="hidden" id="edit_id">
            <input type="hidden" id="edit_data">
            <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Descrição</label><input type="text" id="edit_descricao" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 font-medium" required></div>
            <div class="flex gap-2">
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Valor</label><input type="number" step="0.01" id="edit_valor" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 font-bold" required></div>
                <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Responsável</label><select id="edit_responsavel" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-100 font-medium"><option value="Igor">Igor</option><option value="Thaynara">Thaynara</option></select></div>
            </div>
            <button type="submit" class="w-full py-4 mt-4 btn-active text-white rounded-2xl font-bold active:scale-95 transition">Salvar Alterações</button>
        </form>
    </div>
</div>

<script>
    let dataHist = new Date(); 
    let despesasPagas = []; 
    let abaAtual = 'Fixa';
    
    // Variáveis de estado do Filtro do Diário
    let filtroModo = 'mes'; 
    let filtroParam = '';

    const pad = n => String(n).padStart(2, '0');
    const formatarData = (ds) => { if (!ds || !ds.includes('-')) return '--/--'; const [y,m,d] = ds.split('-'); return `${d}/${m}`; };
    const toYMD = (y, m, d) => `${y}-${pad(m+1)}-${pad(d)}`;

    function gerarSemanasDoMes(ano, mes) {
        let semanas = [];
        let d = new Date(ano, mes, 1);
        while (d.getMonth() === mes) {
            let sDate = d.getDate();
            let eD = new Date(ano, mes, sDate + (6 - d.getDay())); 
            if (eD.getMonth() !== mes) eD = new Date(ano, mes + 1, 0); 
            let eDate = eD.getDate();
            
            let label = `${pad(sDate)}/${pad(mes+1)} até ${pad(eDate)}/${pad(mes+1)}`;
            semanas.push({ label, start: toYMD(ano, mes, sDate), end: toYMD(ano, mes, eDate) });
            
            d.setDate(eDate + 1); 
        }
        return semanas;
    }

    // MÊS GLOBAL: Salva a escolha do usuário
    const mudarMes = (d) => { 
        dataHist.setMonth(dataHist.getMonth() + d); 
        const mesGlobal = { mes: dataHist.getMonth() + 1, ano: dataHist.getFullYear() };
        localStorage.setItem('mesGlobalData', JSON.stringify(mesGlobal));

        filtroModo = 'mes';
        filtroParam = '';
        document.getElementById('select-modo').value = 'mes';
        document.getElementById('select-param').classList.add('hidden');
        carregarH(); 
    };

    const setAba = (tipo) => {
        abaAtual = tipo;
        document.querySelectorAll('[id^="aba-"]').forEach(btn => { btn.classList.remove('bg-white', 'text-theme', 'shadow-sm'); btn.classList.add('text-slate-500'); });
        const activeBtn = document.getElementById(`aba-${tipo}`);
        activeBtn.classList.add('bg-white', 'text-theme', 'shadow-sm'); activeBtn.classList.remove('text-slate-500');
        renderizarLista();
    };

    function mudarModoFiltro(modo) {
        filtroModo = modo;
        const selParam = document.getElementById('select-param');
        selParam.innerHTML = '';
        
        if (modo === 'mes') {
            selParam.classList.add('hidden');
            filtroParam = '';
        } else if (modo === 'semana') {
            selParam.classList.remove('hidden');
            const semanas = gerarSemanasDoMes(dataHist.getFullYear(), dataHist.getMonth());
            semanas.forEach((s, idx) => { selParam.innerHTML += `<option value="${idx}">${s.label}</option>`; });
            filtroParam = '0'; 
        } else if (modo === 'dia') {
            selParam.classList.remove('hidden');
            const diarias = despesasPagas.filter(x => x.tipo_despesa === 'Diária');
            let dias = [...new Set(diarias.map(x => x.data_pagamento || x.data_vencimento))].sort((a,b) => b.localeCompare(a)); 
            
            if (dias.length === 0) {
                selParam.innerHTML = `<option value="">Sem gastos no mês</option>`;
                filtroParam = '';
            } else {
                dias.forEach(d => { selParam.innerHTML += `<option value="${d}">${formatarData(d)}</option>`; });
                filtroParam = dias[0]; 
            }
        }
        renderizarLista();
    }

    function mudarParamFiltro(val) {
        filtroParam = val;
        renderizarLista();
    }

    const carregarH = async () => {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mesDisplayHist').innerText = `${meses[dataHist.getMonth()]} / ${dataHist.getFullYear()}`;
        const r = await fetch(`/api/despesas?mes=${dataHist.getMonth()+1}&ano=${dataHist.getFullYear()}`);
        despesasPagas = (await r.json()).filter(x => x.pago); 
        renderizarLista();
    };

    const renderizarLista = () => {
        const c = document.getElementById('lista-historico'); 
        document.getElementById('filtros-diaria-container').classList.toggle('hidden', abaAtual !== 'Diária');
        let filtradas = despesasPagas.filter(x => x.tipo_despesa === abaAtual);
        
        if (abaAtual === 'Diária') {
            if (filtroModo === 'semana' && filtroParam !== '') {
                const semanas = gerarSemanasDoMes(dataHist.getFullYear(), dataHist.getMonth());
                const s = semanas[parseInt(filtroParam)];
                if (s) {
                    filtradas = filtradas.filter(x => {
                        const dStr = x.data_pagamento || x.data_vencimento;
                        return dStr >= s.start && dStr <= s.end;
                    });
                }
            } else if (filtroModo === 'dia' && filtroParam !== '') {
                filtradas = filtradas.filter(x => {
                    const dStr = x.data_pagamento || x.data_vencimento;
                    return dStr === filtroParam;
                });
            }
        }

        let conteudoHtml = '';
        
        if (abaAtual === 'Diária') {
            const totalDiario = filtradas.reduce((soma, item) => soma + parseFloat(item.valor), 0);
            let rotuloTotal = 'no Mês';
            if (filtroModo === 'semana') rotuloTotal = 'na Semana';
            if (filtroModo === 'dia') rotuloTotal = 'neste Dia';

            conteudoHtml += `
                <div class="p-5 ultra-glass rounded-[28px] border border-white/60 flex flex-col items-center justify-center text-center shadow-sm relative overflow-hidden mb-6">
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-theme-light rounded-full opacity-50 blur-xl"></div>
                    <div class="absolute -left-4 -bottom-4 w-16 h-16 bg-emerald-100 rounded-full opacity-50 blur-xl"></div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Total Gasto ${rotuloTotal}</p>
                    <p class="text-3xl font-black text-theme relative z-10">${Number(totalDiario).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                </div>
            `;
        }

        if (filtradas.length === 0) {
            conteudoHtml += '<p class="text-center text-slate-500 text-xs font-bold mt-10 uppercase tracking-widest">Nenhum registro.</p>';
        } else {
            filtradas.forEach(x => {
                const dataExibicao = x.data_pagamento ? formatarData(x.data_pagamento) : formatarData(x.data_vencimento);
                
                if(abaAtual === 'Diária') {
                    const descSafe = x.descricao.replace(/'/g, "\\'");
                    const icones = { 'Combustível': '⛽', 'Mercado': '🛒', 'Farmácia': '💊', 'Restaurante': '🍽️', 'Shopee': '🛍️', 'Mercado Livre': '📦', 'Besteira': '🍫', 'Outros': '🏷️' };
                    const iconeCat = icones[x.categoria] || '☕'; 

                    conteudoHtml += `
                        <div class="p-5 mb-4 rounded-[28px] ultra-glass flex justify-between items-center transition cursor-pointer hover:bg-white/40"
                             onclick="abrirModalDiaria(${x.id}, '${descSafe}', ${x.valor}, '${x.data_vencimento}', '${x.responsavel_pagamento}', '${dataExibicao}')">
                            <div class="flex items-center gap-4 w-[65%]">
                                <div class="min-w-[40px] h-[40px] rounded-xl bg-white/70 flex items-center justify-center shadow-sm text-lg">${iconeCat}</div>
                                <div class="truncate">
                                    <p class="font-bold text-slate-700 text-sm leading-tight truncate pr-2">${x.descricao}</p>
                                    <p class="text-[9px] font-bold text-slate-500 mt-0.5">${x.categoria} • <span class="text-emerald-500">Pago dia: ${dataExibicao}</span></p>
                                </div>
                            </div>
                            <div class="w-[35%] flex flex-col items-end gap-3 border-l border-white/40 pl-2">
                                <p class="font-black text-slate-800 text-sm mt-3">${Number(x.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                            </div>
                        </div>`;
                } else {
                    const onClickAttr = x.tem_comprovante ? `onclick="window.open('/comprovante/${x.id}', '_blank')"` : `onclick="alert('Baixa sem comprovante.')"`;
                    const iconBadge = x.tem_comprovante ? `<span class="text-emerald-500">📎</span>` : `<span class="text-slate-300">📄</span>`;
                    
                    conteudoHtml += `
                        <div class="p-5 mb-4 rounded-[28px] ultra-glass flex justify-between items-center transition">
                            <div ${onClickAttr} class="flex items-center gap-4 w-[65%] cursor-pointer hover:bg-white/40 rounded-xl p-1">
                                <div class="min-w-[40px] h-[40px] rounded-xl bg-white/70 flex items-center justify-center shadow-sm text-lg">${iconBadge}</div>
                                <div class="truncate">
                                    <p class="font-bold text-slate-700 text-sm leading-tight truncate pr-2">${x.descricao}</p>
                                    <p class="text-[9px] font-bold text-slate-500 mt-0.5">${x.categoria} • <span class="text-emerald-500">Pago dia: ${dataExibicao}</span></p>
                                </div>
                            </div>
                            <div class="w-[35%] flex flex-col items-end gap-3 border-l border-white/40 pl-2">
                                <button onclick="desfazerPagamento(${x.id})" class="text-orange-400 hover:text-orange-500 transition text-[9px] font-black uppercase bg-orange-50 px-2 py-1 rounded-md">Desfazer</button>
                                <p class="font-black text-slate-800 text-sm">${Number(x.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                            </div>
                        </div>`;
                }
            });
        }
        c.innerHTML = conteudoHtml;
    };

    const fecharModais = () => { document.getElementById('modalDetalhesDiaria').classList.add('hidden'); document.getElementById('modalEditarDiaria').classList.add('hidden'); };
    
    const abrirModalDiaria = (id, desc, valor, dataV, resp, dataExibicao) => {
        document.getElementById('det_nome').innerText = desc; document.getElementById('det_valor').innerText = Number(valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        document.getElementById('det_pag').innerText = dataExibicao; document.getElementById('det_resp').innerText = resp;
        
        document.getElementById('btnEditarAbrir').onclick = () => {
            document.getElementById('edit_id').value = id; document.getElementById('edit_descricao').value = desc;
            document.getElementById('edit_valor').value = valor; document.getElementById('edit_data').value = dataV;
            document.getElementById('edit_responsavel').value = resp;
            document.getElementById('modalEditarDiaria').classList.remove('hidden');
        };
        document.getElementById('btnExcluirAtivo').onclick = async () => {
            if(confirm("Excluir este gasto do dia a dia?")) { await fetch(`/api/despesas/${id}`, { method: 'DELETE' }); fecharModais(); carregarH(); }
        };
        document.getElementById('modalDetalhesDiaria').classList.remove('hidden');
    };

    document.getElementById('formEditar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dados = { descricao: document.getElementById('edit_descricao').value, valor: parseFloat(document.getElementById('edit_valor').value), data_vencimento: document.getElementById('edit_data').value, responsavel_pagamento: document.getElementById('edit_responsavel').value };
        await fetch(`/api/despesas/${document.getElementById('edit_id').value}/editar`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
        fecharModais(); carregarH();
    });

    const desfazerPagamento = async (id) => { if(confirm("Marcar como PENDENTE e devolver pro painel?")) { await fetch(`/api/despesas/${id}/desfazer`, { method: 'POST' }); carregarH(); } };

    document.addEventListener("DOMContentLoaded", () => {
        // MÊS GLOBAL: Lê a escolha do usuário
        const mesGlobalStr = localStorage.getItem('mesGlobalData');
        if (mesGlobalStr) {
            const mesGlobal = JSON.parse(mesGlobalStr);
            dataHist = new Date(mesGlobal.ano, mesGlobal.mes - 1, 1);
        }
        carregarH();
    });
</script>
{% endblock %}
