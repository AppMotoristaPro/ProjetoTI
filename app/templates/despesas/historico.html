{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl soft-glass flex items-center justify-center text-slate-400 transition active:scale-90">←</a>
    <h2 class="text-xl font-black text-slate-800">Concluídos</h2>
</div>

<div id="lista-historico" class="space-y-4"></div>

<script>
    const carregarH = async () => {
        const c = document.getElementById('lista-historico');
        const r = await fetch(`/api/despesas?mes=${new Date().getMonth()+1}&ano=${new Date().getFullYear()}`);
        const d = (await r.json()).filter(x => x.pago);
        
        c.innerHTML = d.length ? '' : '<p class="text-center text-slate-400 font-bold mt-10">Nada por aqui 🍃</p>';
        d.forEach(x => {
            c.innerHTML += `
                <div class="p-5 rounded-[28px] soft-glass flex justify-between items-center opacity-70">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center">✔️</div>
                        <div>
                            <p class="font-bold text-slate-700 text-sm">${x.descricao}</p>
                            <p class="text-[9px] font-black text-orange-500 uppercase tracking-wider">PAGO</p>
                        </div>
                    </div>
                    <p class="font-black text-slate-800">${Number(x.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                </div>`;
        });
    };
    carregarH();
</script>
{% endblock %}
