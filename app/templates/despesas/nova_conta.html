{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl soft-glass flex items-center justify-center text-slate-400 transition active:scale-90">←</a>
    <h2 class="text-xl font-black text-slate-800">Novo Plano</h2>
</div>

<div class="soft-glass p-8 rounded-[35px] shadow-sm">
    <form id="formDespesa" class="space-y-6">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Descrição</label>
            <input type="text" name="descricao" required class="w-full mt-2 p-4 rounded-2xl bg-white border-none outline-none text-slate-700 font-medium">
        </div>

        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Valor</label>
                <input type="number" name="valor" step="0.01" required class="w-full mt-2 p-4 rounded-2xl bg-white border-none outline-none font-bold">
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Vencimento</label>
                <input type="date" name="data_vencimento" required class="w-full mt-2 p-4 rounded-2xl bg-white border-none outline-none">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Categoria (Escolha ou Digite)</label>
            <input list="categorias" name="categoria" placeholder="Ex: Mercado, Carro..." class="w-full mt-2 p-4 rounded-2xl bg-white border-none outline-none font-medium">
            <datalist id="categorias">
                <option value="Alimentação">
                <option value="Combustível">
                <option value="Lazer">
                <option value="Manutenção">
                <option value="Contas Fixas">
            </datalist>
        </div>

        <div class="flex gap-4">
            <div class="w-full">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Quem Paga?</label>
                <select name="responsavel_pagamento" class="w-full mt-2 p-4 rounded-2xl bg-white border-none outline-none font-medium">
                    <option value="Igor">Igor</option>
                    <option value="Thaynara">Thaynara</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btnSalvar" class="btn-active w-full py-5 rounded-2xl text-white font-black text-lg tracking-widest transition active:scale-95">SALVAR</button>
    </form>
</div>

<script>
    document.getElementById('formDespesa').addEventListener('submit', async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnSalvar');
        b.innerText = '⏳';
        await fetch('/api/despesas/nova', { method: 'POST', body: new FormData(e.target) });
        window.location.href = '/';
    });
</script>
{% endblock %}
