{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl ultra-glass flex items-center justify-center text-slate-500 hover:text-slate-800 transition active:scale-90">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>
    <h2 class="text-xl font-black text-slate-800 tracking-tight">Adicionar Despesas</h2>
</div>

<div class="ultra-glass p-8 rounded-[35px] shadow-sm">
    <form id="formDespesa" class="space-y-6">
        
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Descrição</label>
            <input type="text" name="descricao" required placeholder="Ex: IPVA" class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none text-slate-800 font-medium">
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Valor</label>
            <input type="number" name="valor" step="0.01" required placeholder="0.00" class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-bold text-slate-800">
        </div>

        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Vencimento Oficial</label>
                <input type="date" name="data_vencimento" required class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none text-slate-800 text-sm">
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-orange-500 uppercase tracking-widest ml-1">Data Prevista Pago</label>
                <input type="date" name="data_pretensao" class="w-full mt-2 p-4 rounded-2xl bg-orange-50/50 border border-orange-100 outline-none text-slate-800 text-sm">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Categoria</label>
            <select name="categoria" required class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-medium text-slate-800">
                <option value="" disabled selected>Selecione a Categoria</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Combustível">Combustível</option>
                <option value="Lazer">Lazer</option>
                <option value="Manutenção">Manutenção</option>
                <option value="Contas Fixas">Contas Fixas</option>
                <option value="Outros">Outros</option>
            </select>
        </div>

        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Responsável</label>
                <select id="selectResp" name="responsavel_pagamento" onchange="atualizarFontesPagamento()" class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-bold text-slate-800">
                    <option value="Igor" selected>Igor</option>
                    <option value="Thaynara">Thaynara</option>
                </select>
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest ml-1">Pago Com:</label>
                <select id="selectFonte" name="fonte_pagamento" class="w-full mt-2 p-4 rounded-2xl bg-indigo-50/50 border border-indigo-100 outline-none font-medium text-slate-800">
                </select>
            </div>
        </div>

        <button type="submit" id="btnSalvar" class="btn-active w-full py-5 rounded-2xl text-white font-black text-lg tracking-widest transition shadow-xl">SALVAR</button>
    </form>
</div>

<script>
    const fontes = {
        'Igor': ['Geral', 'Shopee', 'Uber'],
        'Thaynara': ['Geral', 'Salário', 'VR', 'Vale Combustível']
    };

    function atualizarFontesPagamento() {
        const resp = document.getElementById('selectResp').value;
        const selectFonte = document.getElementById('selectFonte');
        selectFonte.innerHTML = '';
        fontes[resp].forEach(f => {
            selectFonte.innerHTML += `<option value="${f}">${f}</option>`;
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        atualizarFontesPagamento();
        // CORREÇÃO DE FUSO: Pega a data exata do celular do usuário e injeta no input automaticamente
        const tzoffset = (new Date()).getTimezoneOffset() * 60000;
        const hojeISO = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 10);
        document.querySelector('input[name="data_vencimento"]').value = hojeISO;
    });

    document.getElementById('formDespesa').addEventListener('submit', async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnSalvar');
        b.innerText = 'ENVIANDO... ⏳'; b.disabled = true;
        await fetch('/api/despesas/nova', { method: 'POST', body: new FormData(e.target) });
        window.location.href = '/';
    });
</script>
{% endblock %}
