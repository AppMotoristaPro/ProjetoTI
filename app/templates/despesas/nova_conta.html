{% extends 'base.html' %}
{% block content %}
<div class="mb-8 flex items-center gap-4">
    <a href="/" class="w-12 h-12 rounded-2xl ultra-glass flex items-center justify-center text-slate-500 hover:text-slate-700 transition active:scale-90">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>
    <h2 class="text-xl font-black text-slate-800">Adicionar Despesas</h2>
</div>

<div class="ultra-glass p-8 rounded-[35px] shadow-sm">
    <form id="formDespesa" class="space-y-6">
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Descrição</label>
            <input type="text" name="descricao" required class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none text-slate-800 font-medium focus:bg-white">
        </div>

        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Valor</label>
                <input type="number" name="valor" step="0.01" required class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-bold text-slate-800 focus:bg-white">
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Vencimento</label>
                <input type="date" name="data_vencimento" required class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none text-slate-800 focus:bg-white text-sm">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Categoria</label>
            <input list="categorias" name="categoria" placeholder="Selecione ou digite..." class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-medium text-slate-800 focus:bg-white">
            <datalist id="categorias">
                <option value="Alimentação">
                <option value="Combustível">
                <option value="Lazer">
                <option value="Manutenção">
                <option value="Contas Fixas">
            </datalist>
        </div>

        <div class="p-4 rounded-2xl bg-white/40 border border-white/50 flex flex-col gap-3">
            <div class="flex items-center gap-3">
                <input type="checkbox" id="recorrente" name="recorrente" value="true" onchange="toggleParcelas()" class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-600 accent-indigo-600 cursor-pointer">
                <label for="recorrente" class="text-sm font-bold text-slate-700 cursor-pointer select-none">Conta Parcelada ou Fixa?</label>
            </div>
            
            <div id="box-parcelas" class="hidden flex gap-4 mt-2 pt-3 border-t border-white/50">
                <div class="w-1/2">
                    <label class="text-[9px] uppercase text-slate-500 font-bold ml-1">Parcela Atual</label>
                    <input type="number" name="parcela_atual" value="1" min="1" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-center text-slate-800 font-bold outline-none">
                </div>
                <div class="w-1/2">
                    <label class="text-[9px] uppercase text-slate-500 font-bold ml-1">Total de Meses</label>
                    <input type="number" name="total_parcelas" value="1" min="1" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-center text-slate-800 font-bold outline-none">
                </div>
            </div>
        </div>

        <div class="w-full">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Quem Paga?</label>
            <select name="responsavel_pagamento" class="w-full mt-2 p-4 rounded-2xl bg-white/60 border border-white outline-none font-medium text-slate-800 focus:bg-white">
                <option value="Igor">Igor</option>
                <option value="Thaynara">Thaynara</option>
            </select>
        </div>

        <button type="submit" id="btnSalvar" class="btn-active w-full py-5 rounded-2xl text-white font-black text-lg tracking-widest transition active:scale-95">SALVAR</button>
    </form>
</div>

<script>
    function toggleParcelas() {
        const check = document.getElementById('recorrente');
        const box = document.getElementById('box-parcelas');
        if(check.checked) box.classList.remove('hidden');
        else box.classList.add('hidden');
    }

    document.getElementById('formDespesa').addEventListener('submit', async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnSalvar');
        b.innerText = 'ENVIANDO...';
        await fetch('/api/despesas/nova', { method: 'POST', body: new FormData(e.target) });
        window.location.href = '/';
    });
</script>
{% endblock %}
