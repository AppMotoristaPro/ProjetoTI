{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6 ultra-glass p-2 rounded-full">
    <button onclick="mudarMes(-1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-orange-500 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h2 id="mesDisplay" class="text-xs font-bold uppercase tracking-widest text-slate-700">Carregando...</h2>
    <button onclick="mudarMes(1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:text-orange-500 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>
</div>

<div class="ultra-glass p-6 rounded-[32px] mb-4 flex justify-between items-center">
    <div>
        <p class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Total de Despesas</p>
        <p id="total_pendente" class="text-3xl font-black text-slate-800">R$ 0,00</p>
    </div>
</div>

<div class="w-full p-6 rounded-[32px] ultra-glass border border-white shadow-sm mb-4">
    <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Saldo Livre Previsto</h2>
    <div id="saldo_final" class="text-4xl font-black text-slate-800 mt-1">R$ 0,00</div>
</div>

<div class="flex gap-3 mb-6">
    <div onclick="editarRenda('Igor')" class="w-1/2 p-4 rounded-[28px] ultra-glass relative cursor-pointer active:scale-95 transition">
        <div class="absolute top-4 right-4 text-slate-400">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        </div>
        <p class="text-[9px] uppercase font-bold text-slate-500">Renda Igor</p>
        <p id="renda_igor" class="text-lg font-black text-slate-800">R$ 0,00</p>
    </div>
    <div onclick="editarRenda('Thaynara')" class="w-1/2 p-4 rounded-[28px] ultra-glass relative cursor-pointer active:scale-95 transition">
        <div class="absolute top-4 right-4 text-slate-400">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        </div>
        <p class="text-[9px] uppercase font-bold text-slate-500">Renda Thay</p>
        <p id="renda_thaynara" class="text-lg font-black text-slate-800">R$ 0,00</p>
    </div>
</div>

<div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide" id="filtros-semana">
    <button onclick="filtrarSemana('todas')" class="filtro-btn px-5 py-2.5 rounded-2xl bg-white text-slate-800 text-xs font-bold shadow-sm transition-all border border-transparent">Todas</button>
    <button onclick="filtrarSemana(1)" class="filtro-btn px-5 py-2.5 rounded-2xl ultra-glass text-slate-500 text-xs font-bold transition-all border border-transparent">Sem. 1</button>
    <button onclick="filtrarSemana(2)" class="filtro-btn px-5 py-2.5 rounded-2xl ultra-glass text-slate-500 text-xs font-bold transition-all border border-transparent">Sem. 2</button>
    <button onclick="filtrarSemana(3)" class="filtro-btn px-5 py-2.5 rounded-2xl ultra-glass text-slate-500 text-xs font-bold transition-all border border-transparent">Sem. 3</button>
</div>

<div id="lista-despesas" class="space-y-4"></div>

<div id="modalEditar" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
    <div class="w-full max-w-sm ultra-glass rounded-3xl p-6 shadow-2xl relative">
        <button onclick="fecharModalEditar()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <h3 class="text-lg font-black text-slate-800 mb-4">Editar Conta</h3>
        
        <form id="formEditar" class="space-y-3">
            <input type="hidden" id="edit_id">
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Descrição</label>
                <input type="text" id="edit_descricao" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-slate-800 outline-none focus:border-indigo-400 font-medium" required>
            </div>
            <div class="flex gap-2">
                <div class="w-1/2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Valor</label>
                    <input type="number" step="0.01" id="edit_valor" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-slate-800 outline-none focus:border-indigo-400 font-bold" required>
                </div>
                <div class="w-1/2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Vencimento</label>
                    <input type="date" id="edit_data" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-slate-800 outline-none focus:border-indigo-400" required>
                </div>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Responsável</label>
                <select id="edit_responsavel" class="w-full mt-1 p-3 rounded-xl bg-white/60 border border-white text-slate-800 outline-none focus:border-indigo-400 font-medium">
                    <option value="Igor">Igor</option>
                    <option value="Thaynara">Thaynara</option>
                </select>
            </div>
            <button type="submit" class="w-full py-4 mt-4 btn-active text-white rounded-xl font-bold active:scale-95 transition">Salvar Alterações</button>
        </form>
    </div>
</div>

<input type="file" id="fileComprovante" class="hidden" accept=".pdf, image/*">

<script>
    let currentData = new Date();
    let despesasPendentesGlobais = [];

    const formatarMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const formatarData = (ds) => { if (!ds) return '--/--'; const d = new Date(ds); return `${d.getUTCDate()}/${d.getUTCMonth() + 1}`; };

    const atualizarDisplayMes = () => {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mesDisplay').innerText = `${meses[currentData.getMonth()]}/${currentData.getFullYear()}`;
    };

    const carregarDashboard = async () => {
        atualizarDisplayMes();
        const mes = currentData.getMonth() + 1;
        const ano = currentData.getFullYear();

        try {
            const res = await fetch(`/api/resumo?mes=${mes}&ano=${ano}`);
            const d = await res.json();
            document.getElementById('saldo_final').innerText = formatarMoeda(d.saldo_final);
            document.getElementById('total_pendente').innerText = formatarMoeda(d.total_pendente);
            document.getElementById('renda_igor').innerText = formatarMoeda(d.renda_igor);
            document.getElementById('renda_thaynara').innerText = formatarMoeda(d.renda_thaynara);

            const resD = await fetch(`/api/despesas?mes=${mes}&ano=${ano}`);
            despesasPendentesGlobais = (await resD.json()).filter(x => !x.pago);
            filtrarSemana('todas');
        } catch(e) { console.error(e); }
    };

    const filtrarSemana = (s) => {
        document.querySelectorAll('.filtro-btn').forEach(b => {
            b.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            b.classList.add('ultra-glass', 'text-slate-500');
        });
        const btn = event ? event.target : document.querySelector('.filtro-btn');
        btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
        btn.classList.remove('ultra-glass', 'text-slate-500');

        const container = document.getElementById('lista-despesas');
        container.innerHTML = '';

        let filtradas = despesasPendentesGlobais;
        if(s !== 'todas') {
            filtradas = despesasPendentesGlobais.filter(x => {
                const dia = new Date(x.data_vencimento).getUTCDate();
                return s === 1 ? (dia <= 7) : s === 2 ? (dia > 7 && dia <= 14) : (dia > 14 && dia <= 21);
            });
        }

        filtradas.forEach(x => {
            const descSegura = x.descricao.replace(/'/g, "\\'");
            container.innerHTML += `
                <div class="p-5 rounded-[28px] ultra-glass flex justify-between items-center transition active:scale-[0.98]">
                    <div class="flex items-center gap-3 w-1/2">
                        <div class="min-w-[42px] h-[42px] rounded-2xl bg-white/70 flex items-center justify-center text-slate-500 shadow-sm border border-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm leading-tight">${x.descricao}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mt-0.5">Vence ${formatarData(x.data_vencimento)}</p>
                            <span class="inline-block px-2 py-[2px] rounded-md text-[8px] font-black uppercase mt-1 ${x.responsavel_pagamento === 'Igor' ? 'bg-cyan-100/80 text-cyan-700' : 'bg-pink-100/80 text-pink-700'}">${x.responsavel_pagamento}</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-end gap-2 w-1/2">
                        <p class="font-black text-slate-800 text-[15px]">${formatarMoeda(x.valor)}</p>
                        
                        <div class="flex items-center gap-1.5 justify-end w-full">
                            <button onclick="abrirModalEditar(${x.id}, '${descSegura}', ${x.valor}, '${x.data_vencimento}', '${x.responsavel_pagamento}')" class="w-8 h-8 rounded-xl bg-white/60 text-slate-500 flex items-center justify-center hover:bg-white transition shadow-sm border border-white/50">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            
                            <button onclick="excluirDespesa(${x.id})" class="w-8 h-8 rounded-xl bg-white/60 text-red-400 flex items-center justify-center hover:bg-white hover:text-red-500 transition shadow-sm border border-white/50">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            
                            <button id="btn-pagar-${x.id}" onclick="pagarRapido(${x.id})" class="flex-1 h-8 rounded-xl bg-emerald-100/80 text-emerald-700 hover:bg-emerald-200 text-[10px] font-black uppercase transition shadow-sm border border-white/50">Baixa</button>
                        </div>
                    </div>
                </div>`;
        });
    };

    const mudarMes = (d) => { currentData.setMonth(currentData.getMonth() + d); carregarDashboard(); };
    
    // UPLOAD RESTAURADO
    const pagarRapido = async (id) => {
        const confirmarPagamento = confirm("Confirmar que esta conta foi paga?\n\n[OK] = Anexar Comprovante\n[Cancelar] = Dar baixa sem arquivo");
        const btnNode = document.getElementById(`btn-pagar-${id}`);
        btnNode.innerText = "⏳";
        btnNode.disabled = true;

        if (confirmarPagamento) {
            const input = document.getElementById('fileComprovante');
            input.value = ''; 
            input.onchange = async () => {
                await dispararPagamentoAPI(id, input.files.length > 0 ? input.files[0] : null);
            };
            input.click(); 
        } else {
            const apenasDarBaixa = confirm("A conta será marcada como paga SEM comprovante. Prosseguir?");
            if (apenasDarBaixa) {
                await dispararPagamentoAPI(id, null);
            } else {
                btnNode.innerText = "BAIXA";
                btnNode.disabled = false;
            }
        }
    };

    const dispararPagamentoAPI = async (id, file) => {
        const formData = new FormData();
        if (file) formData.append('comprovante', file);
        try { await fetch(`/api/despesas/${id}/pagar`, { method: 'POST', body: formData }); carregarDashboard(); } 
        catch (error) { alert("Erro de conexão."); carregarDashboard(); }
    };

    const editarRenda = async (u) => { 
        let v = prompt(`Renda ${u}:`); 
        if(v) { await fetch('/api/rendas', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:u, mes:currentData.getMonth()+1, ano:currentData.getFullYear(), valor:parseFloat(v)})}); carregarDashboard(); } 
    };

    const abrirModalEditar = (id, desc, valor, data, resp) => {
        document.getElementById('edit_id').value = id;
        document.getElementById('edit_descricao').value = desc;
        document.getElementById('edit_valor').value = valor;
        document.getElementById('edit_data').value = data;
        document.getElementById('edit_responsavel').value = resp;
        document.getElementById('modalEditar').classList.remove('hidden');
    };
    const fecharModalEditar = () => document.getElementById('modalEditar').classList.add('hidden');

    document.getElementById('formEditar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dados = { descricao: document.getElementById('edit_descricao').value, valor: parseFloat(document.getElementById('edit_valor').value), data_vencimento: document.getElementById('edit_data').value, responsavel_pagamento: document.getElementById('edit_responsavel').value };
        await fetch(`/api/despesas/${document.getElementById('edit_id').value}/editar`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
        fecharModalEditar(); carregarDashboard();
    });

    const excluirDespesa = async (id) => {
        if(confirm("Deseja EXCLUIR essa conta definitivamente?")) {
            await fetch(`/api/despesas/${id}`, { method: 'DELETE' }); carregarDashboard();
        }
    };

    document.addEventListener("DOMContentLoaded", carregarDashboard);
</script>
{% endblock %}
