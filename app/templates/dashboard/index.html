{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6 soft-glass p-2 rounded-full">
    <button onclick="mudarMes(-1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-orange-500 transition">◀</button>
    <h2 id="mesDisplay" class="text-xs font-bold uppercase tracking-widest text-slate-600">Carregando...</h2>
    <button onclick="mudarMes(1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-orange-500 transition">▶</button>
</div>

<div class="soft-glass p-6 rounded-[32px] mb-4 flex justify-between items-center">
    <div>
        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-tighter">Total de Despesas</p>
        <p id="total_pendente" class="text-3xl font-black text-slate-800">R$ 0,00</p>
    </div>
    <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-600 font-bold">
        %
    </div>
</div>

<div class="w-full p-6 rounded-[32px] bg-white border border-slate-100 shadow-sm mb-4">
    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Saldo Livre Previsto</h2>
    <div id="saldo_final" class="text-4xl font-black text-slate-800 mt-1">R$ 0,00</div>
</div>

<div class="flex gap-3 mb-6">
    <div onclick="editarRenda('Igor')" class="w-1/2 p-4 rounded-[28px] soft-glass relative cursor-pointer active:scale-95 transition">
        <p class="text-[9px] uppercase font-bold text-slate-400">Renda Igor</p>
        <p id="renda_igor" class="text-lg font-black text-slate-800">R$ 0,00</p>
    </div>
    <div onclick="editarRenda('Thaynara')" class="w-1/2 p-4 rounded-[28px] soft-glass relative cursor-pointer active:scale-95 transition">
        <p class="text-[9px] uppercase font-bold text-slate-400">Renda Thay</p>
        <p id="renda_thaynara" class="text-lg font-black text-slate-800">R$ 0,00</p>
    </div>
</div>

<div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide" id="filtros-semana">
    <button onclick="filtrarSemana('todas')" class="filtro-btn px-5 py-2.5 rounded-2xl bg-white text-slate-800 text-xs font-bold shadow-sm transition-all border border-transparent">Todas</button>
    <button onclick="filtrarSemana(1)" class="filtro-btn px-5 py-2.5 rounded-2xl bg-transparent text-slate-400 text-xs font-bold transition-all border border-transparent">Sem. 1</button>
    <button onclick="filtrarSemana(2)" class="filtro-btn px-5 py-2.5 rounded-2xl bg-transparent text-slate-400 text-xs font-bold transition-all border border-transparent">Sem. 2</button>
    <button onclick="filtrarSemana(3)" class="filtro-btn px-5 py-2.5 rounded-2xl bg-transparent text-slate-400 text-xs font-bold transition-all border border-transparent">Sem. 3</button>
</div>

<div id="lista-despesas" class="space-y-4"></div>

<script>
    let currentData = new Date();
    let despesasPendentesGlobais = [];

    const formatarMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    // CORREÇÃO DO BUG UNDEFINED: Agora usa o objeto Date real
    const formatarData = (ds) => {
        if (!ds) return '--/--';
        const d = new Date(ds);
        return `${d.getUTCDate()}/${d.getUTCMonth() + 1}`;
    };

    const carregarDashboard = async () => {
        const mes = currentData.getMonth() + 1;
        const ano = currentData.getFullYear();
        document.getElementById('mesDisplay').innerText = `${mes}/${ano}`;

        try {
            const res = await fetch(`/api/resumo?mes=${mes}&ano=${ano}`);
            const d = await res.json();
            document.getElementById('saldo_final').innerText = formatarMoeda(d.saldo_final);
            document.getElementById('total_pendente').innerText = formatarMoeda(d.total_pendente);
            document.getElementById('renda_igor').innerText = formatarMoeda(d.renda_igor);
            document.getElementById('renda_thaynara').innerText = formatarMoeda(d.renda_thaynara);

            const resD = await fetch(`/api/despesas?mes=${mes}&ano=${ano}`);
            despesasPendentesGlobais = (await resD.json()).filter(x => !x.pago);
            filtrarSemana('todas');
        } catch(e) { console.error(e); }
    };

    const filtrarSemana = (s) => {
        // Estética do botão ativo
        document.querySelectorAll('.filtro-btn').forEach(b => {
            b.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            b.classList.add('text-slate-400');
        });
        const btn = event ? event.target : document.querySelector('.filtro-btn');
        btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
        btn.classList.remove('text-slate-400');

        const container = document.getElementById('lista-despesas');
        container.innerHTML = '';

        let filtradas = despesasPendentesGlobais;
        if(s !== 'todas') {
            filtradas = despesasPendentesGlobais.filter(x => {
                const dia = new Date(x.data_vencimento).getUTCDate();
                return s === 1 ? (dia <= 7) : s === 2 ? (dia > 7 && dia <= 14) : (dia > 14 && dia <= 21);
            });
        }

        filtradas.forEach(x => {
            container.innerHTML += `
                <div class="p-5 rounded-[28px] bg-white border border-slate-50 shadow-sm flex justify-between items-center transition active:scale-95">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl">💸</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${x.descricao}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Dia ${formatarData(x.data_vencimento)} • ${x.responsavel_pagamento}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-800 text-sm">${formatarMoeda(x.valor)}</p>
                        <button onclick="pagarRapido(${x.id})" class="text-[10px] font-black text-orange-500 uppercase mt-1 tracking-tighter">Pagar</button>
                    </div>
                </div>`;
        });
    };

    const mudarMes = (d) => { currentData.setMonth(currentData.getMonth() + d); carregarDashboard(); };
    const pagarRapido = async (id) => { if(confirm("Pagar?")) { await fetch(`/api/despesas/${id}/pagar`, {method:'POST'}); carregarDashboard(); } };
    const editarRenda = async (u) => { 
        let v = prompt(`Renda ${u}:`); 
        if(v) { 
            await fetch('/api/rendas', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:u, mes:currentData.getMonth()+1, ano:currentData.getFullYear(), valor:parseFloat(v)})}); 
            carregarDashboard(); 
        } 
    };

    document.addEventListener("DOMContentLoaded", carregarDashboard);
</script>
{% endblock %}
