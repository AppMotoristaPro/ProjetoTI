{% extends 'base.html' %}

{% block content %}
<div class="w-full p-6 rounded-3xl bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl mb-8 relative overflow-hidden">

        <div>
            <span class="block">Igor: R$ 0,00</span>
        </div>
        <div class="text-right">
            <span class="block">Thaynara: R$ 0,00</span>
        </div>

</div>

</h3>

            <div class="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-400 border border-orange-500/30">
                ⚡
            </div>
            <div>
                <p class="font-medium text-sm">Conta de Luz</p>

    </div>
</div>
